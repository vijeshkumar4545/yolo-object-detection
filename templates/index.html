<!DOCTYPE html>
<html>
<head>
    <title>YOLO Image Detection</title>
</head>
<body>

<h2>Upload Image for Detection</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Detect</button>
</form>

{% if image %}
    <h3>Result:</h3>
    <img src="{{ url_for('static', filename=image) }}" width="600">
{% endif %}

</body>
</html>
